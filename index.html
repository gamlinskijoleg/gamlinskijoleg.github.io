<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEBFORM</title>
    <link rel="icon" href="icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="window">
      <div id="wrapper">
        <div id="Sign">Sign up</div>
        <form action="" method="post">
          <input type="email" placeholder="Email" id="email" />
          <input type="password" placeholder="Create password" id="password" />
          <input
            type="password"
            placeholder="Confirm password"
            id="confirm-password"
          />
        </form>
        <button id="Signup">Sign up</button>
        <div id="alr">
          Already have an account? <a href="https://google.com" id="a">Login</a>
        </div>
        <div id="line"></div>
        <div id="Or">Or</div>
        <button id="lwg"><img src="free-google-2296064-1912023.png" width="30" height="30">Login with Google</button>
        <button id="lwf"><img src="facebook-removebg-preview.png" width="30" height="30">Login with Facebook</button>
      </div>
    </div>
  </body>
</html>
